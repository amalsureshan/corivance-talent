  //  ochre #8E5915 · tan #D2AF85. Edit here to recolour the whole app.
  //  Roles: text=ink, primary=brand(ochre), CTA/highlight=accent(gold),
  //  background=paper, surface=card. The logo/icon mark is embedded
  //  below as ICON_URI (see BrandMark).
  // ===================================================================
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          ink:   '#161614',   // text (warm black)
          muted: '#79716B',   // secondary text (warm gray)
          line:  '#E8E2D7',   // borders / dividers (warm)
          paper: '#F7F4EE',   // background (warm off-white)
          card:  '#FFFFFF',   // surface
          brand: { DEFAULT: '#8E5915', soft: '#F4E7D2' },  // primary: ochre + tint
          accent:{ DEFAULT: '#FFC536', ink: '#7A4E12' },   // gold (CTAs / highlights)
        },
        fontFamily: {
          sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
          mono: ['"JetBrains Mono"', 'ui-monospace', 'monospace'],
        },
      },
    },
  };
</script>
<style type="text/tailwindcss">
  @layer components {
    .inp  { @apply w-full rounded-lg border border-line bg-white px-3 py-2 text-sm text-ink outline-none transition placeholder:text-muted/60 focus:border-brand focus:ring-2 focus:ring-brand/15; }
    .lbl  { @apply block text-[11px] font-semibold uppercase tracking-wide text-muted mb-1; }
    .btn  { @apply inline-flex items-center justify-center gap-1.5 rounded-lg px-3.5 py-2 text-sm font-semibold transition select-none disabled:opacity-50 disabled:cursor-not-allowed; }
    .btn-primary { @apply btn bg-ink text-white hover:bg-ink/90 active:scale-[.98]; }
    .btn-accent  { @apply btn bg-accent text-ink hover:brightness-95 active:scale-[.98]; }
    .btn-ghost   { @apply btn border border-line bg-white text-ink hover:bg-paper; }
    .btn-soft    { @apply btn bg-brand-soft text-brand hover:brightness-95; }
    .btn-danger  { @apply btn border border-red-200 bg-white text-red-600 hover:bg-red-50; }
    .card  { @apply rounded-xl border border-line/70 bg-card shadow-[0_1px_2px_rgba(22,22,20,0.04),0_1px_3px_rgba(22,22,20,0.05)]; }
    .chip  { @apply inline-flex items-center gap-1 rounded-full px-2 py-0.5 text-[11px] font-medium; }
    .seg   { @apply rounded-md px-3 py-1.5 text-sm font-medium transition; }
    .navlink { @apply flex w-full items-center gap-3 rounded-lg px-3 py-2 text-left text-sm font-medium transition; }
  }
  html, body, #root { height: 100%; }
  body { background: #F7F4EE; }
  ::-webkit-scrollbar { height: 10px; width: 10px; }
  ::-webkit-scrollbar-thumb { background: #D8CFC0; border-radius: 99px; border: 2px solid #F7F4EE; }
  ::-webkit-scrollbar-thumb:hover { background: #C4B8A4; }
  .no-scrollbar::-webkit-scrollbar { display: none; }
  [data-dragover="true"] { outline: 2px dashed #8E5915; outline-offset: -4px; background: #F4E7D2cc; }
  @media (prefers-reduced-motion: reduce) { * { transition: none !important; animation: none !important; } }
</style>

/* ============================ Constants ============================ */
const SUPABASE_URL = window.SUPABASE_URL || "";
const SUPABASE_ANON_KEY = window.SUPABASE_ANON_KEY || "";
const CONFIGURED = /^https?:\/\//.test(SUPABASE_URL) && SUPABASE_ANON_KEY.length > 20;
const sb = CONFIGURED ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY) : null;

const STAGES = ["New","Reviewing","Test Offered","Test Submitted","Evaluated","Hired","Rejected","Archived"];
const ACTIVE_STAGES = STAGES.slice(0, 6);      // pipeline flow
const TERMINAL_STAGES = ["Rejected","Archived"];
const STAGE_COLOR = {
  "New":            "#234A6B",
  "Reviewing":      "#0EA5E9",
  "Test Offered":   "#F59E0B",
  "Test Submitted": "#8B5CF6",
  "Evaluated":      "#14B8A6",
  "Hired":          "#16A34A",
  "Rejected":       "#DC2626",
  "Archived":       "#8A8178",
};
const COLLAB = ["Long-term","Project-based","Both"];
const PAY_TYPES = ["Project-based","Single payment after completion"];
const PROJECT_STATUS = ["Active","On hold","Completed"];
const TEST_OPTS = ["Yes","No","Depends on task"];
const SOURCES = ["Manual","Tally","Referral"];

/* ============================ Helpers ============================ */
const cx = (...a) => a.filter(Boolean).join(" ");
const fmtDate = (d) => d ? new Date(d).toLocaleDateString(undefined,{month:"short",day:"numeric",year:"numeric"}) : "";
const fmtWhen = (d) => d ? new Date(d).toLocaleString(undefined,{month:"short",day:"numeric",hour:"numeric",minute:"2-digit"}) : "";
const arr = (v) => Array.isArray(v) ? v : [];
const splitList = (s) => String(s||"").split(/[,;]+/).map(x=>x.trim()).filter(Boolean);
const tri = (v) => v === true ? "Yes" : v === false ? "No" : "—";
const checklistProgress = (f, items) => {
  const total = items.length;
  const ck = f.checklist || {};
  const done = items.reduce((n,i)=> n + (ck[i.id] ? 1 : 0), 0);
  return { done, total };
};

function hexA(hex, a){ // hex + alpha -> rgba
  const n = parseInt(hex.slice(1),16);
  return `rgba(${(n>>16)&255},${(n>>8)&255},${n&255},${a})`;
}

/* ============================ Tiny UI atoms ============================ */
function StageChip({ stage, className }){
  const c = STAGE_COLOR[stage] || "#6B7280";
  return (
    <span className={cx("chip", className)} style={{background:hexA(c,0.12), color:c}}>
      <span className="h-1.5 w-1.5 rounded-full" style={{background:c}} />
      {stage}
    </span>
  );
}
function Tag({ children }){
  return <span className="chip bg-paper text-muted font-mono">{children}</span>;
}
function Avatar({ name, size=36 }){
  const initials = (name||"?").trim().split(/\s+/).slice(0,2).map(s=>s[0]||"").join("").toUpperCase() || "?";
  return (
    <span className="inline-flex shrink-0 items-center justify-center rounded-full bg-brand-soft font-semibold text-brand"
      style={{ width:size, height:size, fontSize:size*0.38 }} aria-hidden="true">{initials}</span>
  );
}
function Stars({ value }){
  if(!value) return <span className="text-muted text-xs">—</span>;
  return <span className="text-amber-500 text-xs tracking-tight">{"★".repeat(value)}<span className="text-line">{"★".repeat(5-value)}</span></span>;
}
function Field({ label, children, hint }){
  return (
    <label className="block">
      <span className="lbl">{label}</span>
      {children}
      {hint && <span className="mt-1 block text-[11px] text-muted">{hint}</span>}
    </label>
  );
}
function Toggle({ on, onClick, children }){

    <button type="button" onClick={onClick}
      className={cx("chip border transition", on ? "border-brand bg-brand-soft text-brand" : "border-line bg-white text-muted hover:border-muted/40")}>

function PageHeader({ title, subtitle, actions }){

function ChecklistPill({ f, items }){
  if(!items.length) return null;
  const { done, total } = checklistProgress(f, items);
  const complete = done === total;
  return (
    <span className={cx("chip font-mono", complete ? "bg-green-50 text-green-700" : "bg-paper text-muted")}
      title={`${done} of ${total} checklist items done`}>
      <span>{complete ? "✓" : "☑"}</span>{done}/{total}
    </span>
  );
}

/* ============================ Modal shell ============================ */
function Modal({ open, onClose, title, subtitle, children, footer, wide }){
  useEffect(()=>{
    if(!open) return;
    const h = (e)=>{ if(e.key === "Escape") onClose(); };
    window.addEventListener("keydown", h);
    document.body.style.overflow = "hidden";
    return ()=>{ window.removeEventListener("keydown", h); document.body.style.overflow = ""; };
  },[open,onClose]);
  if(!open) return null;
  return (
    <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center bg-ink/40 p-0 sm:p-4" onMouseDown={onClose}>
      <div onMouseDown={(e)=>e.stopPropagation()}
        className={cx("flex max-h-[94vh] w-full flex-col overflow-hidden rounded-t-2xl sm:rounded-2xl bg-paper shadow-2xl", wide ? "sm:max-w-4xl" : "sm:max-w-2xl")}>
        <div className="flex items-start justify-between gap-3 border-b border-line bg-white px-5 py-4">
          <div className="min-w-0">
            <h2 className="truncate text-lg font-bold text-ink">{title}</h2>
            {subtitle && <p className="truncate text-sm text-muted">{subtitle}</p>}
          </div>
          <button onClick={onClose} className="rounded-lg p-1.5 text-muted hover:bg-paper" aria-label="Close">✕</button>
        </div>
        <div className="flex-1 overflow-y-auto px-5 py-5">{children}</div>
        {footer && <div className="flex items-center justify-end gap-2 border-t border-line bg-white px-5 py-3">{footer}</div>}
      </div>
    </div>
  );
}

/* ============================ Comment thread ============================ */
function CommentThread({ items, onAdd, onDelete, placeholder }){
  const [text,setText] = useState("");
  const sorted = [...items].sort((a,b)=> new Date(b.created_at)-new Date(a.created_at));
  return (
    <div>
      <div className="flex gap-2">
        <input className="inp" placeholder={placeholder||"Add a comment…"} value={text}
          onChange={e=>setText(e.target.value)}
          onKeyDown={e=>{ if(e.key==="Enter" && text.trim()){ onAdd(text.trim()); setText(""); } }} />
        <button className="btn-soft shrink-0" disabled={!text.trim()}
          onClick={()=>{ if(text.trim()){ onAdd(text.trim()); setText(""); } }}>Post</button>
      </div>
      <div className="mt-3 space-y-2">
        {sorted.length===0 && <p className="text-sm text-muted">No comments yet.</p>}
        {sorted.map(c=>(
          <div key={c.id} className="group rounded-lg border border-line bg-white px-3 py-2">
            <div className="flex items-start justify-between gap-2">
              <p className="whitespace-pre-wrap text-sm text-ink">{c.body}</p>
              <button onClick={()=>onDelete(c.id)} className="opacity-0 group-hover:opacity-100 text-muted hover:text-red-600 text-xs">delete</button>
            </div>
            <p className="mt-1 font-mono text-[11px] text-muted">{fmtWhen(c.created_at)}</p>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ============================ Multi-select work areas / specialties ============================ */
function WorkAreaPicker({ value, subValue, onChange, onSubChange, workAreas, subSpecialties }){
  const selected = arr(value);
  const subs = subSpecialties.filter(s => selected.includes(s.work_area));
  return (
    <div className="space-y-3">
      <div>
        <span className="lbl">Work areas</span>
        <div className="flex flex-wrap gap-1.5">
          {workAreas.map(w=>(
            <Toggle key={w.id} on={selected.includes(w.name)}
              onClick={()=>{
                const next = selected.includes(w.name) ? selected.filter(x=>x!==w.name) : [...selected,w.name];
                onChange(next);
                onSubChange(arr(subValue).filter(s => subSpecialties.find(ss=>ss.name===s && next.includes(ss.work_area))));
              }}>{w.name}</Toggle>
          ))}
          {workAreas.length===0 && <span className="text-xs text-muted">Add work areas in Settings.</span>}
        </div>
      </div>
      {subs.length>0 && (
        <div>
          <span className="lbl">Sub-specialties</span>
          <div className="flex flex-wrap gap-1.5">
            {subs.map(s=>(
              <Toggle key={s.id} on={arr(subValue).includes(s.name)}
                onClick={()=>{
                  const cur = arr(subValue);
                  onSubChange(cur.includes(s.name) ? cur.filter(x=>x!==s.name) : [...cur,s.name]);
                }}>
                <span className="text-muted">{s.work_area.split(" ")[0]}·</span>{s.name}
              </Toggle>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

/* ============================ Hire → assign to project ============================ */
function AssignDialog({ freelancer, db, onClose }){
  const [mode,setMode] = useState(db.projects.length ? "existing" : "new");
  const [projectId,setProjectId] = useState(db.projects[0]?.id || "");
  const [name,setName] = useState("");
  const [role,setRole] = useState("");
  const [busy,setBusy] = useState(false);
  const go = async () => {
    setBusy(true);
    let pid = projectId;
    if(mode==="new"){
      if(!name.trim()){ setBusy(false); return; }
      const p = await db.createProject({ name:name.trim(), status:"Active" });
      pid = p.id;
    }
    if(pid) await db.assign(pid, freelancer.id, role.trim()||null);
    setBusy(false); onClose();
  };
  return (
    <Modal open onClose={onClose} title="Assign to project" subtitle={freelancer.full_name}
      footer={<><button className="btn-ghost" onClick={onClose}>Cancel</button>
        <button className="btn-primary" disabled={busy || (mode==="existing"&&!projectId) || (mode==="new"&&!name.trim())} onClick={go}>{busy?"Assigning…":"Assign"}</button></>}>
      <div className="mb-4 inline-flex rounded-lg bg-paper p-1">
        <button className={cx("seg", mode==="existing"?"bg-white shadow-sm text-ink":"text-muted")} onClick={()=>setMode("existing")} disabled={!db.projects.length}>Existing project</button>
        <button className={cx("seg", mode==="new"?"bg-white shadow-sm text-ink":"text-muted")} onClick={()=>setMode("new")}>New project</button>
      </div>
      {mode==="existing"
        ? <Field label="Project">
            <select className="inp" value={projectId} onChange={e=>setProjectId(e.target.value)}>
              {db.projects.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}
            </select>
          </Field>
        : <Field label="New project name"><input className="inp" autoFocus value={name} onChange={e=>setName(e.target.value)} /></Field>}
      <div className="mt-3"><Field label="Role on this project (optional)"><input className="inp" value={role} onChange={e=>setRole(e.target.value)} placeholder="e.g. Lead UI designer" /></Field></div>
    </Modal>
  );
}

        const list = items.filter(f=>f.stage===stage);
        const c = STAGE_COLOR[stage];
        return (
          <div key={stage}
            data-dragover={over===stage}
            onDragOver={e=>{ e.preventDefault(); setOver(stage); }}
            onDragLeave={()=> setOver(o=>o===stage?null:o)}
            onDrop={e=>{ e.preventDefault(); setOver(null); const id=e.dataTransfer.getData("text/plain"); if(id) db.setStage(id, stage); }}
            className="flex w-72 shrink-0 flex-col rounded-xl bg-paper/60 ring-1 ring-line">
            <div className="flex items-center justify-between px-3 py-2.5">
              <span className="flex items-center gap-2 text-sm font-semibold text-ink">
                <span className="h-2 w-2 rounded-full" style={{background:c}} />{stage}
              </span>
              <span className="font-mono text-xs text-muted">{list.length}</span>
            </div>
            <div className="flex-1 space-y-2 px-2 pb-2">
              {list.map(f=><FreelancerCard key={f.id} f={f} db={db} onOpen={onOpen} draggable />)}
              {list.length===0 && <p className="px-1 py-2 text-xs text-muted">—</p>}
            </div>
          </div>
        );
      })}
    </div>
  );
}

/* ============================ Pipeline view ============================ */
function Pipeline({ db, onOpen, presetStage, clearPreset }){
  const [view,setView] = useState("list");
  const [q,setQ] = useState("");
  const [fWA,setFWA] = useState("");
  const [fSub,setFSub] = useState("");
  const [fStage,setFStage] = useState("");
  const [fCollab,setFCollab] = useState("");
  const [fRating,setFRating] = useState("");
  const [fCheck,setFCheck] = useState(""); // checklist item id "incomplete"

  // Open filtered to a stage when arriving from a dashboard tile.
  useEffect(()=>{ if(presetStage){ setFStage(presetStage); clearPreset && clearPreset(); } }, [presetStage]);

  const items = useMemo(()=>{
    const ql = q.trim().toLowerCase();
    return db.freelancers.filter(f=>{
      if(ql){
        const hay = [f.full_name,f.email,arr(f.tags).join(" "),arr(f.work_areas).join(" "),f.design_tools].join(" ").toLowerCase();
        if(!hay.includes(ql)) return false;
      }
      if(fWA && !arr(f.work_areas).includes(fWA)) return false;
      if(fSub && !arr(f.sub_specialties).includes(fSub)) return false;
      if(fStage && f.stage!==fStage) return false;
      if(fCollab && f.collaboration_type!==fCollab) return false;
      if(fRating && (f.rating||0) < Number(fRating)) return false;
      if(fCheck && (f.checklist||{})[fCheck]) return false; // show only those NOT done
      return true;
    });
  },[db.freelancers,q,fWA,fSub,fStage,fCollab,fRating,fCheck]);

  const clearFilters = ()=>{ setQ("");setFWA("");setFSub("");setFStage("");setFCollab("");setFRating("");setFCheck(""); };
  const anyFilter = q||fWA||fSub||fStage||fCollab||fRating||fCheck;

  return (
    <div>
      <PageHeader title="Talent Pipeline" subtitle="Source, vet, and move freelancers through hiring" />
      <div className="card mb-5 flex flex-wrap items-center gap-2 p-3">
        <div className="inline-flex rounded-lg border border-line bg-white p-1">
          <button className={cx("seg", view==="list"?"bg-brand-soft text-brand":"text-muted")} onClick={()=>setView("list")}>List</button>
          <button className={cx("seg", view==="board"?"bg-brand-soft text-brand":"text-muted")} onClick={()=>setView("board")}>Board</button>
        </div>
        <input className="inp max-w-xs" placeholder="Search name, email, tag, tool…" value={q} onChange={e=>setQ(e.target.value)} />
        <select className="inp max-w-[150px]" value={fWA} onChange={e=>{setFWA(e.target.value);setFSub("");}}>
          <option value="">All work areas</option>{db.workAreas.map(w=><option key={w.id}>{w.name}</option>)}
        </select>
        {fWA && <select className="inp max-w-[150px]" value={fSub} onChange={e=>setFSub(e.target.value)}>
          <option value="">All specialties</option>{db.subSpecialties.filter(s=>s.work_area===fWA).map(s=><option key={s.id}>{s.name}</option>)}
        </select>}
        <select className="inp max-w-[150px]" value={fStage} onChange={e=>setFStage(e.target.value)}>
          <option value="">All stages</option>{STAGES.map(s=><option key={s}>{s}</option>)}
        </select>
        <select className="inp max-w-[150px]" value={fCollab} onChange={e=>setFCollab(e.target.value)}>
          <option value="">Any collaboration</option>{COLLAB.map(c=><option key={c}>{c}</option>)}
        </select>
        <select className="inp max-w-[120px]" value={fRating} onChange={e=>setFRating(e.target.value)}>
          <option value="">Any rating</option>{[5,4,3,2,1].map(n=><option key={n} value={n}>{n}★+</option>)}
        </select>
        {db.checklistItems.length>0 &&
          <select className="inp max-w-[180px]" value={fCheck} onChange={e=>setFCheck(e.target.value)}>
            <option value="">Checklist: any</option>
            {db.checklistItems.map(i=><option key={i.id} value={i.id}>Not done: {i.label}</option>)}
          </select>}
        {anyFilter && <button className="btn-ghost" onClick={clearFilters}>Clear</button>}
        <span className="ml-auto font-mono text-xs text-muted">{items.length} / {db.freelancers.length}</span>
      </div>

      {view==="board"
        ? <Board items={items} db={db} onOpen={onOpen} />
        : <ListTable items={items} db={db} onOpen={onOpen} />}
    </div>
  );
}

              const count = db.assignments.filter(a=>a.project_id===p.id).length;

                    <ProjectStatusChip status={p.status} />

                  {p.description && <p className="mt-1 line-clamp-2 text-sm text-muted">{p.description}</p>}

function ProjectStatusChip({ status }){
  const m = { "Active":"#16A34A", "On hold":"#F59E0B", "Completed":"#6B7280" }[status] || "#6B7280";
  return <span className="chip" style={{background:hexA(m,0.12), color:m}}>{status}</span>;
}

function ProjectDetail({ project, db, onClose }){
  const isNew = !project.id;
  const [d,setD] = useState(()=>({ name:"", description:"", status:"Active", start_date:"", end_date:"", ...project }));
  const set = (k,v)=>setD(p=>({...p,[k]:v}));
  const [busy,setBusy] = useState(false);
  const [addId,setAddId] = useState("");
  const assignments = db.assignments.filter(a=>a.project_id===project.id);
  const projComments = db.comments.filter(c=>c.project_id===project.id);
  const assignedIds = assignments.map(a=>a.freelancer_id);
  const candidates = db.freelancers.filter(f=>!assignedIds.includes(f.id));

  const save = async () => {
    setBusy(true);
    const payload = { name:d.name.trim(), description:d.description||null, status:d.status,
      start_date:d.start_date||null, end_date:d.end_date||null };
    await db.saveProject(project.id, payload);
    setBusy(false); onClose();
  };

  return (
    <Modal open onClose={onClose} wide title={isNew?"New project":d.name||"Project"}
      footer={<>
        {!isNew && <button className="btn-danger mr-auto" onClick={async()=>{ if(confirm("Delete this project? Assignments and project comments are removed; freelancer records stay.")){ await db.deleteProject(project.id); onClose(); } }}>Delete</button>}
        <button className="btn-ghost" onClick={onClose}>Cancel</button>
        <button className="btn-primary" disabled={busy||!d.name.trim()} onClick={save}>{busy?"Saving…":"Save"}</button>
      </>}>
      <Section title="Details">
        <div className="grid gap-3 sm:grid-cols-2">
          <Field label="Project name"><input className="inp" value={d.name} onChange={e=>set("name",e.target.value)} /></Field>
          <Field label="Status"><select className="inp" value={d.status} onChange={e=>set("status",e.target.value)}>{PROJECT_STATUS.map(s=><option key={s}>{s}</option>)}</select></Field>
          <Field label="Start date"><input className="inp" type="date" value={d.start_date||""} onChange={e=>set("start_date",e.target.value)} /></Field>
          <Field label="End date"><input className="inp" type="date" value={d.end_date||""} onChange={e=>set("end_date",e.target.value)} /></Field>
        </div>
        <div className="mt-3"><Field label="Description"><textarea className="inp" rows={2} value={d.description||""} onChange={e=>set("description",e.target.value)} /></Field></div>
      </Section>

      {!isNew && (
        <>
          <Section title={`Roster (${assignments.length})`}>
            <div className="mb-3 flex gap-2">
              <select className="inp" value={addId} onChange={e=>setAddId(e.target.value)}>
                <option value="">Assign a freelancer…</option>
                {candidates.map(f=><option key={f.id} value={f.id}>{f.full_name}</option>)}
              </select>
              <button className="btn-soft shrink-0" disabled={!addId} onClick={async()=>{ await db.assign(project.id, addId, null); setAddId(""); }}>Add</button>
            </div>
            <div className="space-y-3">
              {assignments.length===0 && <p className="text-sm text-muted">No freelancers assigned yet.</p>}
              {assignments.map(a=>{
                const f = db.freelancers.find(x=>x.id===a.freelancer_id);
                if(!f) return null;
                const updates = db.comments.filter(c=>c.assignment_id===a.id);
                return (
                  <div key={a.id} className="rounded-xl border border-line bg-white p-3">
                    <div className="flex items-center justify-between gap-2">
                      <div>
                        <span className="font-semibold text-ink">{f.full_name}</span>
                        <input className="ml-2 rounded border border-line px-2 py-0.5 text-xs text-muted" placeholder="role…" defaultValue={a.role||""}
                          onBlur={e=>{ if(e.target.value!==(a.role||"")) db.updateAssignmentRole(a.id, e.target.value||null); }} />
                      </div>
                      <button className="text-xs text-muted hover:text-red-600" onClick={()=>{ if(confirm("Remove from project?")) db.unassign(a.id); }}>remove</button>
                    </div>
                    <div className="mt-2">
                      <CommentThread items={updates} placeholder={`Update on ${f.full_name}…`}
                        onAdd={(body)=>db.addComment({ assignment_id:a.id, project_id:project.id, freelancer_id:f.id, body })}
                        onDelete={(id)=>db.deleteComment(id)} />
                    </div>
                  </div>
                );
              })}
            </div>
          </Section>

          <Section title="Project comments">
            <CommentThread items={projComments.filter(c=>!c.assignment_id)}
              onAdd={(body)=>db.addComment({ project_id:project.id, body })}
              onDelete={(id)=>db.deleteComment(id)} />
          </Section>
        </>
      )}
    </Modal>
  );
}

/* ============================ Freelancers directory (read-only) ============================ */
const PROSPECT_STAGES = ["New","Reviewing","Test Offered","Test Submitted","Evaluated"];
const DIR_FILTERS = [["all","All"],["prospects","Prospects"],["hired","Hired"],["archived","Archived"],["rejected","Rejected"]];
const dirMatch = (f, key) => {
  if(key==="all") return true;
  if(key==="prospects") return PROSPECT_STAGES.includes(f.stage);
  if(key==="hired") return f.stage==="Hired";
  if(key==="archived") return f.stage==="Archived";
  if(key==="rejected") return f.stage==="Rejected";
  return true;
};
function Freelancers({ db, onOpen }){
  const [filter,setFilter] = useState("all");
  const [q,setQ] = useState("");
  const items = db.freelancers.filter(f=>{
    if(!dirMatch(f, filter)) return false;
    if(q.trim()){
      const hay=[f.full_name,f.email,arr(f.work_areas).join(" "),arr(f.tags).join(" ")].join(" ").toLowerCase();
      if(!hay.includes(q.trim().toLowerCase())) return false;
    }
    return true;
  });
  return (
    <div>
      <PageHeader title="Freelancers" subtitle="Everyone in the directory — prospects and hired" />
      <div className="mb-4 flex flex-wrap items-center gap-2">
        <div className="inline-flex flex-wrap rounded-lg border border-line bg-white p-1">
          {DIR_FILTERS.map(([k,l])=>(
            <button key={k} onClick={()=>setFilter(k)} className={cx("seg", filter===k?"bg-brand-soft text-brand":"text-muted hover:text-ink")}>
              {l} <span className="font-mono text-[11px] opacity-70">{db.freelancers.filter(f=>dirMatch(f,k)).length}</span>
            </button>
          ))}
        </div>
        <input className="inp max-w-xs" placeholder="Search name, email, work area…" value={q} onChange={e=>setQ(e.target.value)} />
        <span className="ml-auto font-mono text-xs text-muted">{items.length}</span>
      </div>
      {items.length===0 ? <Empty>No freelancers here yet.</Empty> :
        <div className="grid gap-4 sm:grid-cols-2 xl:grid-cols-3">
          {items.map(f=>(
            <button key={f.id} onClick={()=>onOpen(f)} className="card p-5 text-left transition hover:-translate-y-0.5 hover:shadow-md">
              <div className="flex items-center gap-3">
                <Avatar name={f.full_name} size={44} />
                <div className="min-w-0">
                  <p className="truncate font-semibold text-ink">{f.full_name}</p>
                  {f.email && <p className="truncate text-xs text-muted">{f.email}</p>}
                </div>
                <div className="ml-auto"><Stars value={f.rating} /></div>
              </div>
              {arr(f.work_areas).length>0 && <div className="mt-3 flex flex-wrap gap-1">{arr(f.work_areas).slice(0,3).map(w=><Tag key={w}>{w}</Tag>)}</div>}
              <div className="mt-4 flex items-center justify-between gap-2 border-t border-line/70 pt-3">
                <StageChip stage={f.stage} />
                <ChecklistPill f={f} items={db.checklistItems} />
              </div>
            </button>
          ))}
        </div>}
    </div>
  );
}
function ReadOnlyRow({ label, value }){

const IMPORT_FIELDS = [
  ["full_name","Full name"],["email","Email"],["phone","Phone / WhatsApp"],["portfolio_link","Portfolio link"],
  ["work_areas","Work areas (list)"],["sub_specialties","Sub-specialties (list)"],["hours_per_week","Hours per week"],
  ["collaboration_type","Collaboration type"],["turnaround_time","Turnaround"],["design_tools","Design tools"],
  ["ok_with_feedback","OK with feedback (yes/no)"],["can_share_source","Can share source (yes/no)"],
  ["past_project_types","Past project types"],["best_portfolio_projects","Best portfolio projects"],
  ["willing_design_test","Willing design test"],["intake_notes","Notes"],
];
const guessField = (header) => {
  const h = header.toLowerCase().replace(/[^a-z]/g,"");
  const tests = [
    ["full_name", ["fullname","name"]],["email",["email","mail"]],["phone",["phone","whatsapp","mobile","contact"]],
    ["portfolio_link",["portfolio","website","link","behance","dribbble"]],["work_areas",["workarea","area","services","skills"]],
    ["sub_specialties",["subspecial","specialt"]],["hours_per_week",["hour","perweek","availab"]],
    ["collaboration_type",["collab","engagement","longterm"]],["turnaround_time",["turnaround","delivery"]],
    ["design_tools",["tool","software","figma"]],["ok_with_feedback",["feedback","revision"]],
    ["can_share_source",["source","editable","sourcefile"]],["past_project_types",["pasttype","previous","experience"]],
    ["best_portfolio_projects",["bestproject","threeproject","topproject","portfolioproject"]],
    ["willing_design_test",["test","trial","task"]],["intake_notes",["note","anythingelse","comment","else"]],
  ];
  for(const [field,keys] of tests){ if(keys.some(k=>h.includes(k))) return field; }
  return "";
};
function ImportDialog({ db, onClose }){
  const [rows,setRows] = useState(null);
  const [headers,setHeaders] = useState([]);
  const [map,setMap] = useState({});
  const [busy,setBusy] = useState(false);
  const [done,setDone] = useState(0);

  const onFile = (file) => {
    window.Papa.parse(file, { header:true, skipEmptyLines:true, complete:(res)=>{
      const hs = res.meta.fields || [];
      setHeaders(hs); setRows(res.data);
      const m = {}; hs.forEach(h=> m[h]=guessField(h)); setMap(m);
    }});
  };
  const doImport = async () => {
    setBusy(true);
    const used = Object.entries(map).filter(([,f])=>f);
    const records = rows.map(r=>{
      const rec = { stage:"New", source:"Tally", work_areas:[], sub_specialties:[], tags:[] };
      for(const [h,f] of used){
        const v = (r[h]??"").toString().trim();
        if(v==="") continue;
        if(f==="work_areas"||f==="sub_specialties") rec[f]=splitList(v);
        else if(f==="ok_with_feedback"||f==="can_share_source") rec[f]=/^(y|yes|true|1)/i.test(v);
        else rec[f]=v;
      }
      return rec;
    }).filter(r=>r.full_name);
    let n=0;
    for(const rec of records){ await db.saveFreelancer(null, rec); n++; setDone(n); }
    setBusy(false); onClose();
  };

  return (
    <Modal open onClose={onClose} wide title="Import from CSV" subtitle="Tally export → New prospects"
      footer={<><button className="btn-ghost" onClick={onClose}>Cancel</button>
        {rows && <button className="btn-primary" disabled={busy} onClick={doImport}>{busy?`Importing ${done}/${rows.length}…`:`Import ${rows.filter(r=>r).length} rows`}</button>}</>}>
      {!rows ? (
        <div>
          <p className="mb-3 text-sm text-muted">Export your Tally responses as CSV, then choose the file. You'll be able to check the column mapping before importing.</p>
          <input type="file" accept=".csv,text/csv" className="inp" onChange={e=>{ const f=e.target.files?.[0]; if(f) onFile(f); }} />
        </div>
      ) : (
        <div>
          <p className="mb-3 text-sm text-muted">Map each CSV column to a field. Set to <em>Ignore</em> to skip. Rows without a full name are skipped. All imported records start in <strong>New</strong>.</p>
          <div className="card divide-y divide-line">
            {headers.map(h=>(
              <div key={h} className="flex items-center gap-3 px-3 py-2">
                <span className="w-1/2 truncate text-sm text-ink" title={h}>{h}</span>
                <span className="text-muted">→</span>
                <select className="inp" value={map[h]||""} onChange={e=>setMap(m=>({...m,[h]:e.target.value}))}>
                  <option value="">Ignore</option>
                  {IMPORT_FIELDS.map(([k,lbl])=><option key={k} value={k}>{lbl}</option>)}
                </select>
              </div>
            ))}
          </div>
        </div>
      )}
    </Modal>
  );
}

/* ============================ Data layer hook ============================ */
function useDB(){
  const [freelancers,setF] = useState([]);
  const [projects,setP] = useState([]);
  const [assignments,setA] = useState([]);
  const [comments,setC] = useState([]);
  const [workAreas,setWA] = useState([]);
  const [subSpecialties,setSS] = useState([]);
  const [checklistItems,setCI] = useState([]);
  const [ready,setReady] = useState(false);
  const [error,setError] = useState("");

  const loadF  = useCallback(async()=>{ const {data,error}=await sb.from("freelancers").select("*").order("created_at",{ascending:false}); if(error)setError(error.message); else setF(data||[]); },[]);
  const loadP  = useCallback(async()=>{ const {data}=await sb.from("projects").select("*").order("created_at",{ascending:false}); setP(data||[]); },[]);
  const loadA  = useCallback(async()=>{ const {data}=await sb.from("project_assignments").select("*").order("created_at"); setA(data||[]); },[]);
  const loadC  = useCallback(async()=>{ const {data}=await sb.from("comments").select("*").order("created_at"); setC(data||[]); },[]);
  const loadOpt= useCallback(async()=>{
    const [w,s,c] = await Promise.all([
      sb.from("work_areas").select("*").order("sort_order").order("name"),
      sb.from("sub_specialties").select("*").order("sort_order").order("name"),
      sb.from("checklist_items").select("*").order("sort_order").order("id"),
    ]);
    setWA(w.data||[]); setSS(s.data||[]); setCI(c.data||[]);
  },[]);

  const loadAll = useCallback(async()=>{
    await Promise.all([loadF(),loadP(),loadA(),loadC(),loadOpt()]);
    setReady(true);
  },[loadF,loadP,loadA,loadC,loadOpt]);

  useEffect(()=>{ loadAll(); },[loadAll]);

  const api = useMemo(()=>({
    freelancers, projects, assignments, comments, workAreas, subSpecialties, checklistItems, ready, error,

    saveFreelancer: async (id, payload) => {
      if(id){ const {data}=await sb.from("freelancers").update(payload).eq("id",id).select().single(); }
      else  { const {data}=await sb.from("freelancers").insert(payload).select().single(); }
      await loadF(); return true;
    },
    deleteFreelancer: async (id) => { await sb.from("freelancers").delete().eq("id",id); await Promise.all([loadF(),loadA(),loadC()]); },
    setStage: async (id, stage) => {
      setF(prev=>prev.map(f=>f.id===id?{...f,stage}:f)); // optimistic
      await sb.from("freelancers").update({stage}).eq("id",id); loadF();
    },

    createProject: async (payload) => { const {data}=await sb.from("projects").insert(payload).select().single(); await loadP(); return data; },
    saveProject: async (id, payload) => { if(id) await sb.from("projects").update(payload).eq("id",id); else await sb.from("projects").insert(payload); await loadP(); },
    deleteProject: async (id) => { await sb.from("projects").delete().eq("id",id); await Promise.all([loadP(),loadA(),loadC()]); },

    assign: async (project_id, freelancer_id, role) => { await sb.from("project_assignments").insert({project_id,freelancer_id,role}); await loadA(); },
    unassign: async (id) => { await sb.from("project_assignments").delete().eq("id",id); await Promise.all([loadA(),loadC()]); },
    updateAssignmentRole: async (id, role) => { await sb.from("project_assignments").update({role}).eq("id",id); await loadA(); },

    addComment: async (payload) => { await sb.from("comments").insert(payload); await loadC(); },
    deleteComment: async (id) => { await sb.from("comments").delete().eq("id",id); await loadC(); },

    addWorkArea: async (name) => { await sb.from("work_areas").insert({name}); await loadOpt(); },
    addSubSpecialty: async (work_area,name) => { await sb.from("sub_specialties").insert({work_area,name}); await loadOpt(); },
    addChecklistItem: async (label) => { await sb.from("checklist_items").insert({label}); await loadOpt(); },
    removeOption: async (table,id) => { await sb.from(table).delete().eq("id",id); await loadOpt(); },

    reload: loadAll,
  }),[freelancers,projects,assignments,comments,workAreas,subSpecialties,checklistItems,ready,error,loadF,loadP,loadA,loadC,loadOpt,loadAll]);

  return api;
}

/* ============================ Export ============================ */
function downloadFile(name, text, type){
  const blob = new Blob([text], {type});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a"); a.href=url; a.download=name; a.click();
  URL.revokeObjectURL(url);
}
function exportCSV(freelancers){
  const cols = ["full_name","email","phone","portfolio_link","work_areas","sub_specialties","hours_per_week","collaboration_type","turnaround_time","design_tools","ok_with_feedback","can_share_source","willing_design_test","stage","quoted_rate","currency","pay_type","rating","tags","source"];
  const esc = (v)=>{ if(v==null)return ""; const s=Array.isArray(v)?v.join("; "):String(v); return /[",\n]/.test(s)?`"${s.replace(/"/g,'""')}"`:s; };
  const lines = [cols.join(",")].concat(freelancers.map(f=>cols.map(c=>esc(f[c])).join(",")));
  downloadFile(`corivance-pipeline-${new Date().toISOString().slice(0,10)}.csv`, lines.join("\n"), "text/csv");
}

            {tab==="dashboard" && <Dashboard db={db} go={setTab} onStageClick={openStage} />}
            {tab==="pipeline" && <Pipeline db={db} onOpen={openEdit} presetStage={stagePreset} clearPreset={()=>setStagePreset("")} />}
            {tab==="freelancers" && <Freelancers db={db} onOpen={openView} />}
            {tab==="projects" && <Projects db={db} />}
            {tab==="settings" && <Settings db={db} />}
          </>
        )}
      </main>

      {importing && <ImportDialog db={db} onClose={()=>setImporting(false)} />}
    </div>
  );
}

/* ============================ Auth root ============================ */
function App(){
  if(!CONFIGURED) return <SetupScreen />;
  const [session,setSession] = useState(undefined);

  useEffect(()=>{
    sb.auth.getSession().then(({data})=> setSession(data.session));
    const { data:sub } = sb.auth.onAuthStateChange((_e, s)=> setSession(s));
    return ()=> sub.subscription.unsubscribe();
  },[]);

  if(session===undefined) return <div className="flex h-full items-center justify-center text-sm text-muted">Loading…</div>;
  if(!session) return <Login />;
  return <SignedIn session={session} />;
}
function SignedIn({ session }){
  const db = useDB();
  return <Shell session={session} db={db} />;
}

try { const _l=document.createElement("link"); _l.rel="icon"; _l.href=ICON_URI; document.head.appendChild(_l); } catch(e){}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
